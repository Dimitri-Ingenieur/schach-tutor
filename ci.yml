name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Systempakete (Stockfish, Tk, Xvfb)
        run: sudo apt-get update && sudo apt-get install -y stockfish python3-tk xvfb
      - name: Python-Abhängigkeiten
        run: pip install -r requirements.txt
      - name: Logik-Tests (Headless)
        run: python selftest.py --engine /usr/games/stockfish --nodes 10000
      - name: GUI-Rauchtest (Xvfb)
        run: xvfb-run -a python gui_smoke.py
